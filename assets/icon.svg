<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F12"/>
    </linearGradient>
    <linearGradient id="book1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="book2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="book3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="book4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="book5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <linearGradient id="book6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
    <linearGradient id="book7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#d35400"/>
    </linearGradient>
    <linearGradient id="book8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e84393"/>
      <stop offset="100%" stop-color="#d63384"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- ===== TOP SHELF ===== -->
  <!-- Shelf plank -->
  <rect x="130" y="408" width="764" height="18" rx="4" fill="url(#shelf)" opacity="0.9"/>

  <!-- Book spines (top row) - sitting on the shelf -->
  <!-- Red book -->
  <rect x="180" y="198" width="62" height="210" rx="6" fill="url(#book1)"/>
  <rect x="183" y="208" width="56" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="183" y="220" width="40" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <line x1="211" y1="260" x2="211" y2="380" stroke="#fff" stroke-width="1.5" opacity="0.1"/>

  <!-- Blue book (taller) -->
  <rect x="252" y="178" width="70" height="230" rx="6" fill="url(#book2)"/>
  <rect x="256" y="188" width="62" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="256" y="200" width="45" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <line x1="287" y1="240" x2="287" y2="390" stroke="#fff" stroke-width="1.5" opacity="0.1"/>

  <!-- Green book -->
  <rect x="332" y="218" width="55" height="190" rx="6" fill="url(#book3)"/>
  <rect x="335" y="228" width="49" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="335" y="240" width="35" height="3" rx="1.5" fill="#fff" opacity="0.2"/>

  <!-- Yellow/orange book (slightly tilted lean right) -->
  <g transform="rotate(4, 425, 408)">
    <rect x="400" y="208" width="50" height="200" rx="6" fill="url(#book4)"/>
    <rect x="403" y="218" width="44" height="4" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Purple book -->
  <rect x="468" y="188" width="65" height="220" rx="6" fill="url(#book5)"/>
  <rect x="472" y="198" width="57" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="472" y="210" width="42" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <line x1="500" y1="250" x2="500" y2="390" stroke="#fff" stroke-width="1.5" opacity="0.1"/>

  <!-- Teal book -->
  <rect x="543" y="228" width="58" height="180" rx="6" fill="url(#book6)"/>
  <rect x="546" y="238" width="52" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="546" y="250" width="38" height="3" rx="1.5" fill="#fff" opacity="0.2"/>

  <!-- Orange-red thin book -->
  <rect x="612" y="238" width="42" height="170" rx="5" fill="url(#book7)"/>
  <rect x="615" y="248" width="36" height="4" rx="2" fill="#fff" opacity="0.3"/>

  <!-- Pink book -->
  <rect x="664" y="198" width="60" height="210" rx="6" fill="url(#book8)"/>
  <rect x="667" y="208" width="54" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="667" y="220" width="38" height="3" rx="1.5" fill="#fff" opacity="0.2"/>

  <!-- Small red book at end -->
  <rect x="734" y="258" width="45" height="150" rx="5" fill="#e74c3c" opacity="0.7"/>
  <rect x="737" y="268" width="39" height="3" rx="1.5" fill="#fff" opacity="0.3"/>

  <!-- ===== BOTTOM SHELF ===== -->
  <!-- Shelf plank -->
  <rect x="130" y="748" width="764" height="18" rx="4" fill="url(#shelf)" opacity="0.9"/>

  <!-- Book spines (bottom row) -->
  <!-- Teal book -->
  <rect x="180" y="548" width="68" height="200" rx="6" fill="url(#book6)"/>
  <rect x="184" y="558" width="60" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="184" y="570" width="44" height="3" rx="1.5" fill="#fff" opacity="0.2"/>

  <!-- Purple book (taller) -->
  <rect x="258" y="518" width="58" height="230" rx="6" fill="url(#book5)"/>
  <rect x="261" y="528" width="52" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="261" y="540" width="38" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <line x1="287" y1="580" x2="287" y2="730" stroke="#fff" stroke-width="1.5" opacity="0.1"/>

  <!-- Orange book -->
  <rect x="326" y="558" width="50" height="190" rx="6" fill="url(#book4)"/>
  <rect x="329" y="568" width="44" height="4" rx="2" fill="#fff" opacity="0.3"/>

  <!-- Red book -->
  <rect x="386" y="538" width="65" height="210" rx="6" fill="url(#book1)"/>
  <rect x="389" y="548" width="59" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="389" y="560" width="42" height="3" rx="1.5" fill="#fff" opacity="0.2"/>

  <!-- Leaning book (tilted left) -->
  <g transform="rotate(-5, 490, 748)">
    <rect x="465" y="568" width="50" height="180" rx="6" fill="url(#book2)"/>
    <rect x="468" y="578" width="44" height="4" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Green book -->
  <rect x="530" y="528" width="72" height="220" rx="6" fill="url(#book3)"/>
  <rect x="534" y="538" width="64" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="534" y="550" width="48" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <line x1="566" y1="590" x2="566" y2="730" stroke="#fff" stroke-width="1.5" opacity="0.1"/>

  <!-- Pink book -->
  <rect x="612" y="558" width="55" height="190" rx="6" fill="url(#book8)"/>
  <rect x="615" y="568" width="49" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="615" y="580" width="35" height="3" rx="1.5" fill="#fff" opacity="0.2"/>

  <!-- Blue thin book -->
  <rect x="677" y="578" width="40" height="170" rx="5" fill="#3498db" opacity="0.7"/>
  <rect x="680" y="588" width="34" height="3" rx="1.5" fill="#fff" opacity="0.3"/>

  <!-- Orange book at end -->
  <rect x="727" y="548" width="56" height="200" rx="6" fill="url(#book7)"/>
  <rect x="730" y="558" width="50" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="730" y="570" width="36" height="3" rx="1.5" fill="#fff" opacity="0.2"/>

  <!-- Subtle glow overlay -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)" opacity="0"/>
</svg>
